<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNC Code Generator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>CNC Code Generator</h1>

    <div class="container">

        <label for="operation">Operation</label>

<select id="operation">
    <option value="rectangle">Rectangular Profile</option>
    <option value="circle">Circular Profile</option>
    <option value="rectPocket">Rectangular Pocket</option>
    <option value="circlePocket">Circular Pocket</option>
    <option value="face">Facing</option>
    <option value="drill">Drilling</option>
</select>

        <label for="toolSelect">Tool</label>

<select id="toolSelect">
    <option value="">-- Select Tool --</option>

    <option value="1">1 - 1/16" End Mill</option>
    <option value="2">2 - 1/8" End Mill</option>
    <option value="3">3 - 3/16" End Mill</option>
    <option value="4">4 - 1/4" End Mill</option>
    <option value="5">5 - 3/8" End Mill</option>
    <option value="6">6 - 1/2" End Mill</option>
</select>

<label>Spindle Speed (RPM)</label>
<input type="number" id="spindleSpeed" value="3000">

<label>Safe Z Height</label>
<input type="number" id="safeZ" step="0.001" value="0.100">

<label>Final Depth</label>
<input type="number" id="finalDepth" step="0.001" value="-0.250">

<label>Depth Per Pass</label>
<input type="number" id="depthPerPass" step="0.001" value="0.050">
        <label for="width">Width</label>
        <input
            type="number"
            id="width"
            placeholder="Enter width">

        <label for="height">Height</label>
        <input
            type="number"
            id="height"
            placeholder="Enter height">

        <label for="feed">Feed Rate</label>
        <input
            type="number"
            id="feed"
            placeholder="Enter feed rate">

        <button onclick="generateGCode()">
            Generate G-Code
        </button>

        <h2>Generated G-Code</h2>

        <textarea
            id="output"
            rows="20"
            readonly></textarea>

    </div>

    <script src="app.js"></script>

</body>
</html>
