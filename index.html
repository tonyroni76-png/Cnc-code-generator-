<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNC Code Generator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>CNC Code Generator</h1>

    <div class="container">

        <label for="width">Width</label>
        <input
            type="number"
            id="width"
            placeholder="Enter width">

        <label for="height">Height</label>
        <input
            type="number"
            id="height"
            placeholder="Enter height">

        <label for="depth">Depth</label>
        <input
            type="number"
            id="depth"
            step="0.001"
            placeholder="Enter depth">

        <label for="feed">Feed Rate</label>
        <input
            type="number"
            id="feed"
            placeholder="Enter feed rate">

        <button onclick="generateGCode()">
            Generate G-Code
        </button>

        <h2>Generated G-Code</h2>

        <textarea
            id="output"
            rows="20"
            readonly></textarea>

    </div>

    <script src="app.js"></script>

</body>
</html>
